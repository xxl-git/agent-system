name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build packages
        run: npx tsc -b

      - name: Run unit tests
        run: |
          npx ts-node packages/events/src/__tests__/events.test.ts
          npx ts-node packages/experience/src/__tests__/experience.test.ts
          npx ts-node packages/llm/src/__tests__/llm.test.ts
          npx ts-node packages/memory/src/__tests__/memory.test.ts
          npx ts-node packages/models-core/src/__tests__/models-core.test.ts
          npx ts-node packages/prompts/src/__tests__/prompts.test.ts
          npx ts-node packages/resilience/src/__tests__/resilience.test.ts
          npx ts-node packages/skills/src/__tests__/skills.test.ts
          npx ts-node packages/tools/src/__tests__/tools.test.ts

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
