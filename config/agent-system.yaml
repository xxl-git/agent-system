system:
  name: agent-system
  version: 0.9.2
models:
  defaultProvider: lmstudio
  providers:
    lmstudio:
      baseUrl: http://127.0.0.1:1234/v1
      apiKey: not-needed
      model: qwen/qwen3.5-9b
      timeoutMs: 300000
      maxOutputTokens: 4096
  customProviders:
    - id: deepseek:deepseek-chat
      name: deepseek-chat
      baseUrl: https://api.deepseek.com/v1
      apiKey: ${DEEPSEEK_API_KEY}
      type: openai
      model: deepseek-chat
memory:
  filePath: ./memory
  dbPath: ./data/memory.db
  strictRecording: true
smartAdapter:
  callTimeoutMs: 300000
  maxRetries: 5
  retryBaseMs: 2000
  minContentLength: 1
  emptyLoopThreshold: 3
  maxToolCallsPerResponse: 0
  repetitionThreshold: 0.3
  maxSimilarConsecutive: 3
  ngramSize: 4
logging:
  level: info
  dir: ./logs
  maxFileSizeMB: 10
  maxRotatedFiles: 5
agent:
  loopIntervalMs: 1000
  heartbeatIntervalMs: 300000
  maxSubTasks: 10
  defaultTimeoutMs: 600000
  callTimeoutMs: 300000
  maxRetries: 5
  emptyLoopThreshold: 3
  debugLogging: false
context:
  maxTokens: 4000
  hotWindowSize: 12
  summaryTokenBudget: 512
  compressionThreshold: 0.75
  preserveToolResults: true
  preserveSystem: true
  attentionEnabled: true
nonsense:
  checkIntervalMs: 10000
  maxConversationDurationMs: 0
  thresholds:
    minEffectiveChars: 2
    highRepeatRatio: 0.6
    highRepeatMinLength: 4
    loopDetectMinLength: 10
    loopDetectMinStrippedLength: 6
    lowDiversityRatio: 0.4
    lowDiversityMinLength: 9
  customCrashPatterns: []
  customRules: []
diagnostics:
  maxPingFailures: 3
  includeProbeSnapshot: true
idleTasks:
  defaultCooldownMs: 120000
  defaultMaxFails: 3
circuitBreaker:
  failureThreshold: 5
  resetTimeoutMs: 30000
  halfOpenMaxRequests: 3
  halfOpenSuccessThreshold: 0.5
checkpoint:
  contextWindow: 20
  maxRecoveryAttempts: 3
  dataDir: data/checkpoints
probes:
  concurrency: 1
  timeoutMs: 60000
profiles:
  dataDir: data/profiles
server:
  port: 19701
  chatTimeoutMs: 350000
  maxUploadSizeMB: 20
  cors:
    # 允许的来源列表，空或 ["*"] 表示允许所有
    # 生产环境建议设置为具体域名，如 ["http://127.0.0.1:19701", "http://localhost:19701"]
    allowedOrigins:
      - "http://127.0.0.1:19701"
      - "http://localhost:19701"
      - "http://localhost:5173"
      - "http://localhost:3000"
