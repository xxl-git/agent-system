# Agent System Docker Compose
# 使用：docker compose up -d

version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-system
    ports:
      - "19701:19701"
    environment:
      - NODE_ENV=production
      - PORT=19701
      # LM Studio 地址（host.docker.internal 访问宿主机服务）
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234
    volumes:
      # 持久化数据
      - ./data:/app/data
      - ./logs:/app/logs
      - ./memory:/app/memory
      - ./uploads:/app/uploads
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:19701/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
