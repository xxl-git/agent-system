<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent System — 日志查看器</title>
<style>
* { margin:0; padding:0; box-sizing: border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
  background: #1a1b26; color: #e4e4e7; height: 100vh; display: flex; flex-direction: column;
}
header {
  background: rgba(18,20,30,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(99,102,241,0.1);
  padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 12px;
}
header h1 { font-size: 16px; font-weight: 600; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.back-btn { color: #888; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; }
.back-btn:hover { color: #e4e4e7; background: rgba(255,255,255,0.05); }

.controls {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px;
  background: rgba(6,8,14,0.6); border-bottom: 1px solid rgba(255,255,255,0.06);
}
.controls label { font-size: 12px; color: #888; }
.controls select {
  padding: 8px 12px; background: #2a2b35; color: #e4e4e7;
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 13px;
  outline: none; cursor: pointer;
}
.controls select:focus { border-color: rgba(99,102,241,0.4); }
.controls .refresh-btn {
  padding: 8px 16px; background: rgba(99,102,241,0.1); color: #818cf8;
  border: none; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.controls .refresh-btn:hover { background: rgba(99,102,241,0.2); }

.log-container {
  flex: 1; overflow-y: auto; padding: 20px; font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12px; line-height: 1.6;
}
.log-line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-all; }
.log-line .timestamp { color: #666; margin-right: 8px; }
.log-line .level-INFO { color: #4ade80; }
.log-line .level-DEBUG { color: #60a5fa; }
.log-line .level-WARN { color: #fbbf24; }
.log-line .level-ERROR { color: #f87171; }
.log-line .module { color: #a78bfa; margin-right: 8px; }

.loading { text-align: center; padding: 40px; color: #666; }
.error { text-align: center; padding: 40px; color: #f87171; }
</style>
</head>
<body>
<header id="pageHeader" title="pageHeader">
  <a href="/agent-ui.html" class="back-btn" id="backBtn" title="backBtn">← 返回控制台</a>
  <h1 id="pageTitle" title="pageTitle">📄 日志查看器</h1>
</header>

<div class="controls" id="controlsBar" title="controlsBar">
  <label for="dateSelect" id="dateLabel" title="dateLabel">选择日期：</label>
  <select id="dateSelect" title="dateSelect" onchange="loadLog()">
    <option value="">加载中...</option>
  </select>
  <button class="refresh-btn" id="refreshBtn" title="refreshBtn" onclick="loadLogsList()">🔄 刷新列表</button>
  <button class="refresh-btn" id="autoScrollBtn" title="autoScrollBtn" onclick="autoScroll=!autoScroll; this.textContent=autoScroll?'⏸ 暂停滚动':'⏵ 自动滚动';">⏵ 自动滚动</button>
</div>

<div class="log-container" id="logContainer" title="logContainer">
  <div class="loading" id="loadingIndicator" title="loadingIndicator">请选择日期加载日志...</div>
</div>

<script>
let autoScroll = true;
let currentDate = null;

// 加载日志文件列表
async function loadLogsList() {
  const select = document.getElementById('dateSelect');
  select.innerHTML = '<option value="">加载中...</option>';
  try {
    const resp = await fetch('/api/logs');
    const data = await resp.json();
    if (data.files && data.files.length > 0) {
      select.innerHTML = '<option value="">-- 选择日期 --</option>';
      data.files.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.date;
        opt.textContent = `${f.date} (${formatSize(f.size)}${f.compressed ? ' 📦' : ''})`;
        select.appendChild(opt);
      });
      // 自动选择最新日志
      if (data.files[0]) {
        select.value = data.files[0].date;
        loadLog();
      }
    } else {
      select.innerHTML = '<option value="">暂无日志文件</option>';
    }
  } catch (err) {
    select.innerHTML = '<option value="">加载失败</option>';
    console.error('加载日志列表失败:', err);
  }
}

// 读取指定日期的日志内容
async function loadLog() {
  const date = document.getElementById('dateSelect').value;
  if (!date) return;
  currentDate = date;
  const container = document.getElementById('logContainer');
  container.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const resp = await fetch(`/api/logs/${date}`);
    if (!resp.ok) throw new Error('加载失败');
    const text = await resp.text();
    displayLog(text);
  } catch (err) {
    container.innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
  }
}

// 显示日志内容
function displayLog(text) {
  const container = document.getElementById('logContainer');
  const lines = text.split('\n').filter(l => l.trim());
  container.innerHTML = '';
  lines.forEach(line => {
    const div = document.createElement('div');
    div.className = 'log-line';
    // 尝试解析日志格式: [timestamp] [LEVEL] [module] message
    const match = line.match(/^\[([^\]]+)\]\s\[([^\]]+)\]\s(?:\[([^\]]+)\]\s)?(.*)$/);
    if (match) {
      const [, timestamp, level, module, message] = match;
      div.innerHTML = `
        <span class="timestamp">${timestamp}</span>
        <span class="level-${level}">${level}</span>
        ${module ? `<span class="module">[${module}]</span>` : ''}
        <span>${escapeHtml(message)}</span>
      `;
    } else {
      div.textContent = line;
    }
    container.appendChild(div);
  });
  if (autoScroll) container.scrollTop = container.scrollHeight;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 初始化
loadLogsList();
// 自动刷新（每 30 秒）
setInterval(() => {
  if (currentDate && autoScroll) loadLog();
}, 30000);
</script>
</body>
</html>
